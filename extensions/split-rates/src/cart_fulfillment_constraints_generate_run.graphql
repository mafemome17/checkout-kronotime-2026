query CartFulfillmentConstraintsGenerateRunInput {
  cart {
    lines{
      id
    }
    deliverableLines {
      id
    }
    retailLocation {
      name
    }
  }
  locations {
    id
    name
  }
  fulfillmentConstraintRule {
    metafield(namespace: "$app:fulfillment-constraints", key: "function-configuration") {
      jsonValue
    }
  }
}